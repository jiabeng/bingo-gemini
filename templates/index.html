<div class="grid">
    <div class="card">
        <h3>🔥 連續開出 (連N期)</h3>
        <div id="hot-streak-list"></div>
        <h3 style="margin-top:20px;">❄️ 長期未開 (遺漏N期)</h3>
        <div id="cold-streak-list"></div>
    </div>

    <div class="card">
        <h3>🔗 連號遺漏追蹤 (5期以上)</h3>
        <table id="pair-miss-table">
            <thead><tr><th>組合</th><th>未開期數</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h3>👯 同時出現頻率 (最強組合)</h3>
        <div id="corr-list"></div>
    </div>
</div>

<script>
function render() {
    if(!resData) return;

    // 1. 連續開出
    document.getElementById('hot-streak-list').innerHTML = resData.hot_streaks.map(item => 
        `<span class="tag" style="background:#ff4444; color:white;">${item.num} (連${item.val}期)</span>`
    ).join('');

    // 2. 遺漏期數
    document.getElementById('cold-streak-list').innerHTML = resData.cold_streaks.map(item => 
        `<span class="tag" style="background:#546e7a; color:white;">${item.num} (缺${item.val}期)</span>`
    ).join('');

    // 3. 連號遺漏表格
    const pmBody = document.querySelector('#pair-miss-table tbody');
    pmBody.innerHTML = '';
    for (const [pair, miss] of Object.entries(resData.pair_missing)) {
        pmBody.innerHTML += `<tr><td>${pair}</td><td style="color:#ffcc00; font-weight:bold;">${miss} 期</td></tr>`;
    }

    // 4. 強勢組合
    document.getElementById('corr-list').innerHTML = resData.correlations.map(item => 
        `<div style="margin-bottom:8px;">💎 <b>${item.pair}</b> : 今日同出 ${item.count} 次</div>`
    ).join('');
}
</script>
