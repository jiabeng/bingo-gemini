<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO AI 量化策略終端</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0b0e14; --card: #1c2331; --text: #cfd8dc; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-top: 3px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .recom-box { text-align: center; background: linear-gradient(145deg, #232d3f, #0b0e14); padding: 30px; border: 1px solid #333; }
        .num-display { font-size: 2.8em; font-weight: 900; color: var(--gold); letter-spacing: 8px; margin: 15px 0; text-shadow: 0 0 20px rgba(255,204,0,0.3); }
        .tag { display: inline-block; background: #37474f; color: var(--gold); padding: 4px 10px; border-radius: 5px; margin: 3px; font-weight: bold; font-size: 0.9em; }
        .mode-btn { background: #263238; color: #888; border: 1px solid #444; padding: 8px 16px; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .mode-btn.active { background: var(--gold); color: black; border-color: var(--gold); font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: #888; font-size: 0.8em; border-bottom: 2px solid #333; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #252d3d; font-size: 0.85em; }
        .win { color: #4caf50; font-weight: bold; }
        .super-ball { background: var(--gold); color: black; width: 25px; height: 25px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center; color: var(--gold);">🛠 BINGO AI 量化分析系統</h1>

    <div class="grid">
        <div class="card recom-box">
            <h2>🎯 下期四星預測</h2>
            <div style="margin-bottom: 15px;">

                <button class="mode-btn" onclick="setMode('aggressive')">激進</button>
                <button class="mode-btn" onclick="setMode('defensive')">防守</button>
            </div>
            <div class="num-display" id="main-recom">-- -- -- --</div>
            <div style="font-size: 0.9em;">今日實戰中獎率：<span id="win-rate" class="win">0</span>%</div>
        </div>

        <div class="card recom-box" style="border-top-color: #ff4444;">
            <h2>🔥 超級獎號建議 (熱力尾數)</h2>
            <div class="num-display" id="super-recom" style="color: #ff4444;">-- -- -- --</div>
            <div style="font-size: 0.8em; opacity: 0.6;">基於今日強勢尾數循環與遺漏分析</div>
        </div>
    </div>

            <div id="cold-nums" style="opacity: 0.6;"></div>
        </div>
        <div class="card">
