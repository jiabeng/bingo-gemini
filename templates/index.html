<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BINGO AI 量化分析系統</title>
    <style>
        :root { --gold: #ffcc00; --bg: #0b0e14; --card: #1c2331; }
        body { background: var(--bg); color: #cfd8dc; font-family: sans-serif; padding: 20px; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; border-top: 4px solid var(--gold); }
        .mode-btn { background: #37474f; color: white; border: none; padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 5px; }
        .mode-btn.active { background: var(--gold); color: black; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #252d3d; font-size: 0.9em; }
        .recom-display { font-size: 2.5em; color: var(--gold); text-align: center; margin: 20px 0; letter-spacing: 5px; }
        .win-tag { color: #4caf50; font-weight: bold; }
        .super-tag { background: var(--gold); color: black; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🤖 BINGO AI 量化分析系統</h1>
    
    <div class="card">
        <h2>🎯 下期四星建議</h2>
        <div style="text-align: center;">
            <button class="mode-btn active" onclick="switchMode('adaptive')">自適應模式</button>
            <button class="mode-btn" onclick="switchMode('aggressive')">激進型 (熱門)</button>
            <button class="mode-btn" onclick="switchMode('defensive')">防守型 (冷門)</button>
        </div>
        <div class="recom-display" id="recom-nums">-- -- -- --</div>
        <div style="text-align:center;">今日實戰命中率：<span id="win-rate" style="color:var(--gold)">0</span>%</div>
    </div>

    <div class="card">
        <h2>📊 實戰建議比對看板 (含超級獎號查詢)</h2>
        <div style="margin-bottom: 15px;">
            查詢日期：<input type="date" id="date-query" onchange="loadData()">
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>期數</th>
                        <th>系統當期建議</th>
                        <th>實際開獎號碼</th>
                        <th>超級</th>
                        <th>命中</th>
                        <th>結果</th>
                    </tr>
                </thead>
                <tbody id="comp-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        let allData = null;
        let currentMode = 'adaptive';

        async function loadData() {
            const date = document.getElementById('date-query').value;
            const res = await fetch(`./api/strategy${date ? '?date='+date : ''}`);
            allData = await res.json();
            render();
        }

        function switchMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }

        function render() {
            if(!allData || allData.status !== 'success') return;

            // 更新建議號碼
            document.getElementById('recom-nums').innerText = allData.next_recom[currentMode].join(' ');
            document.getElementById('win-rate').innerText = allData.live_win_rate;

            // 更新表格
            const body = document.getElementById('comp-body');
            body.innerHTML = '';
            allData.history.forEach(item => {
                const row = `
                    <tr>
                        <td>${item.no}<br><small>${item.time}</small></td>
                        <td style="color:var(--gold)">${item.suggestion.join(',')}</td>
                        <td style="font-size:0.8em; opacity:0.7;">${item.nums.join(',')}</td>
                        <td><span class="super-tag">${item.super}</span></td>
                        <td>${item.match}</td>
                        <td>${item.is_win ? '<span class="win-tag">★中獎</span>' : '未中'}</td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        }

        // 初始載入
        document.getElementById('date-query').valueAsDate = new Date();
        loadData();
    </script>
</body>
</html>
